# Tooling config for the Python daemon. No build/deps here — the daemon is
# standard-library only; this exists purely for ruff (lint + format).

[tool.ruff]
target-version = "py310"
line-length = 88
extend-exclude = ["node_modules"]

[tool.ruff.lint]
# pycodestyle errors/warnings, pyflakes, import sorting, bugbear, pyupgrade.
select = ["E", "F", "W", "I", "B", "UP"]

[tool.ruff.format]
quote-style = "double"
