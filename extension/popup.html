<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { color-scheme: light dark; }
    body {
      font: 13px/1.4 system-ui, sans-serif;
      width: 320px;
      margin: 0;
      padding: 14px;
    }
    h1 { font-size: 14px; margin: 0 0 10px; }
    .row { margin-bottom: 12px; }
    .label { font-weight: 600; margin-bottom: 4px; }
    .path {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      word-break: break-all;
      background: rgba(127,127,127,0.15);
      padding: 6px 8px;
      border-radius: 4px;
    }
    button {
      font: inherit;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid rgba(127,127,127,0.5);
      background: transparent;
      cursor: pointer;
    }
    button:hover { background: rgba(127,127,127,0.15); }
    .status { display: flex; align-items: center; gap: 6px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #999; }
    .dot.ok { background: #3fb950; }
    .dot.bad { background: #f85149; }
    .muted { opacity: 0.7; }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border: 1px solid rgba(127,127,127,0.35);
      border-radius: 8px; margin-bottom: 14px;
    }
    .toggle-row .label { font-weight: 600; margin: 0; }
    .switch { position: relative; width: 40px; height: 22px; flex: none; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; cursor: pointer;
      background: rgba(127,127,127,0.4); border-radius: 22px; transition: 0.15s;
    }
    .slider::before {
      content: ""; position: absolute; height: 16px; width: 16px;
      left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.15s;
    }
    .switch input:checked + .slider { background: #3fb950; }
    .switch input:checked + .slider::before { transform: translateX(18px); }
    .switch input:disabled + .slider { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Meraki Annotator</h1>

  <div class="toggle-row">
    <div class="label" id="toggle-label">Disabled</div>
    <label class="switch">
      <input type="checkbox" id="annotate-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row status">
    <span class="dot" id="dot"></span>
    <span id="status-text">Checking daemon…</span>
  </div>

  <div class="row">
    <div class="label">Database</div>
    <div class="path" id="db-path">—</div>
  </div>

  <div class="row">
    <div class="label">Org output folder</div>
    <div class="path" id="org-folder">—</div>
  </div>

  <div class="row">
    <button id="open-settings">Settings…</button>
  </div>

  <div class="row muted" id="error" style="display:none; color:#f85149;"></div>

  <script src="vendor/browser-polyfill.js"></script>
  <script src="popup.js"></script>
</body>
</html>
