<!DOCTYPE html>
<!-- data-meraki-autoactivate tells the content script to activate on load so the
     debug harness can smoke-test the daemon connection without a manual toggle.
     Only this fixture sets it; real pages stay dormant by default. -->
<html data-meraki-autoactivate><head><meta charset="utf-8"><title>Meraki Test Page</title></head>
<body><h1>Meraki annotator test</h1>
<p>The quick brown fox jumps over the lazy dog. This paragraph exists so there is
selectable text to highlight and anchor against during end-to-end testing.</p>
<p>A second paragraph follows, giving us a multi-block selection target for the
CSS Custom Highlight API rendering path.</p></body></html>
